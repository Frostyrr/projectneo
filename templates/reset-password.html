<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Neo</title>
    <link rel="icon" type="image/x-icon" href="/static/images/singleNEO.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <link rel="stylesheet" href="/static/CSS/auth.css">
</head>
<body>

<div id="home" class="landing-hero">

    <nav class="landing-nav">
        <a href="/login" class="nav-brand">
            <img src="/static/images/NEO.png" alt="Neo Logo">
        </a>
        <div class="nav-links">
            <a href="/login#home">Home</a>
            <a href="/login#features">Features</a>
            <a href="/login#about">About</a>
            <a href="/login#contact">Contact</a>
        </div>
    </nav>

    <div class="hero-content-wrapper">
        <div class="hero-text-section">
            <h1>Neo.</h1>
            <h2>Reset Your Password</h2>
            <p>Create a new password to continue using your account securely.</p>
        </div>
        <div class="hero-form-section">
            <div class="auth-card">
                <h2 class="auth-card-title">Create New Password</h2>

                <form class="auth-form" action="/reset-password/{{ email }}" method="POST">
                    <div class="input-group">
                        <label>New Password</label>
                        <div class="input-with-icon">
                            <span class="material-symbols-rounded">lock</span>
                            <input type="password" id="password" name="password" placeholder="Enter new password" required>
                            <span class="material-symbols-rounded toggle-password" id="togglePassword">visibility</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <div class="input-with-icon">
                            <span class="material-symbols-rounded">lock</span>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                            <span class="material-symbols-rounded toggle-password" id="toggleConfirmPassword">visibility</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Reset Password</button>
                </form>

                <div class="auth-footer">
                    Remembered your password? <a href="/login" class="auth-link">Log in</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='JS/auth.js') }}"></script>

</body>
</html>
