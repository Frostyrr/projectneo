<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Neo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <link rel="stylesheet" href="/static/CSS/schedule.css">
</head>
<body>

<div class="tasks-layout">
    <!-- Header -->
    <header class="tasks-header">
        <a href="/chat" class="back-btn">
            <span class="material-symbols-rounded">arrow_back</span>
        </a>
        <h2>My Schedule</h2>
    </header>

    <main class="tasks-content">
        <div class="tasks-card">
            <!-- Add Class Form -->
            <div class="task-form">
                <input type="text" id="classInput" placeholder="Class" required>
                
                <select id="dayInput" required>
                    <option value="" disabled selected>Day</option>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                </select>

                <select id="startTimeInput" required>
                    <option value="" disabled selected>Start Time</option>
                </select>
                <select id="endTimeInput" required>
                    <option value="" disabled selected>End Time</option>
                </select>

                <input type="text" id="locationInput" placeholder="Location" required>

                <div class="task-buttons">
                    <button id="addClassBtn">Add</button>
                    <button id="deleteClassBtn">Delete</button>
                </div>
            </div>

            <!-- Schedule Table -->
            <div class="tasks-table-container">
                <table id="scheduleTable">
                    <thead>
                        <tr id="scheduleHeaderRow">
                            <th>Class</th>
                            <th>Time</th>
                            <th>Day</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="/static/JS/Schedule.js"></script>
</body>
</html>
