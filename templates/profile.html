<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Neo</title>
    <link rel="icon" type="image/x-icon" href="/static/images/singleNEO.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/static/CSS/settings.css">
</head>
<body>
    <div class="settings-layout">
        <header class="settings-header">
            <a href="/chat" class="back-btn" title="Back to Chat">
                <span class="material-symbols-rounded">arrow_back</span>
            </a>
            <h2>Settings</h2>
        </header>

        <main class="settings-content">
            <div class="settings-card">
                
                <div class="profile-header">
                    <div class="avatar-circle">
                        <span class="material-symbols-rounded" style="font-size: 40px;">person</span>
                    </div>
                    <div class="profile-info">
                        <h3>{{ username }}</h3>
                        <p>Personal Account</p>
                    </div>
                </div>

                {% if message %}
                <div class="success-banner">
                    <span class="material-symbols-rounded">check_circle</span>
                    {{ message }}
                </div>
                {% endif %}

                <form class="settings-form" action="/profile" method="POST">
                    
                    <div class="form-section">
                        <h4>Contact Information</h4>
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <div class="input-with-icon">
                                <span class="material-symbols-rounded">mail</span>
                                <input type="email" id="email" name="email" value="{{ email }}" placeholder="Update your email" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section divider">
                        <h4>Security</h4>
                        <p class="section-desc">Leave the password field blank if you do not wish to change it.</p>
                        
                        <div class="input-group">
                            <label for="password">New Password</label>
                            <div class="input-with-icon">
                                <span class="material-symbols-rounded">lock</span>
                                <input type="password" id="password" name="password" placeholder="Enter a new password">
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/chat" class="cancel-btn">Cancel</a>
                        <button type="submit" class="save-btn">Save Changes</button>
                    </div>
                </form>

            </div>
        </main>
    </div>
</body>
</html>
