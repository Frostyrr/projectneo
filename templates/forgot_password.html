<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Neo Assistant</title>
    <link rel="icon" type="image/x-icon" href="/static/images/singleNEO.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/static/CSS/auth.css">
</head>
<body>

    <div id="home" class="landing-hero">
        <nav class="landing-nav">
            <a href="/login" class="nav-brand">
                <img src="/static/images/NEO.png" alt="Neo Logo">
            </a>
            <div class="nav-links">
                <a href="/login#home">Home</a>
                <a href="/login#features">Features</a>
                <a href="/login#about">About</a>
                <a href="/login#contact">Contact</a>
            </div>
        </nav>

        <div class="hero-content-wrapper">
            <div class="hero-text-section">
                <h1>Neo.</h1>
                <h2>Your Personal Assistant</h2>
                <p>Regain access to your account to continue managing your workflow.</p>
            </div>

            <div class="hero-form-section">
                <div class="auth-card">
                    <h2 class="auth-card-title">Reset Password</h2>
                    <p style="color: #a0a0a0; font-size: 14px; margin-bottom: 24px; text-align: left;">
                        Enter the email address associated with your account and we'll send you a link to reset your password.
                    </p>

                    <form class="auth-form" action="/forgot-password" method="POST">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <div class="input-with-icon">
                                <span class="material-symbols-rounded">mail</span>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary" style="margin-top: 10px;">Send Reset Link</button>
                    </form>

                    <div class="auth-footer">
                        Remembered your password? <a href="/login" class="auth-link">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
