<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Neo Assistant</title>
    <link rel="icon" type="image/x-icon" href="/static/images/singleNEO.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/static/CSS/auth.css">
</head>
<body>

    <div id="home" class="landing-hero">
        <nav class="landing-nav">
            <a href="/login" class="nav-brand">
                <img src="/static/images/NEO.png" alt="Neo Logo">
            </a>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#features">Features</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </div>
        </nav>

        <div class="hero-content-wrapper">
            <div class="hero-text-section">
                <h1>Neo.</h1>
                <h2>Your Personal Assistant</h2>
                <p>Neo helps you manage your schedules, and organize your daily tasks seamlessly.</p>
                <a href="#features" class="btn-outline">LEARN MORE</a>
            </div>

            <div class="hero-form-section">
                <div class="auth-card-light">
                    <div class="auth-card-title">REGISTER</div>
                    
                    {% if error %}
                    <div class="auth-error">{{ error }}</div>
                    {% endif %}

                    <form class="auth-form" action="/register" method="POST">
                        <div class="input-with-icon">
                            <span class="material-symbols-rounded">person</span>
                            <input type="text" name="username" placeholder="Enter username" required>
                        </div>

                        <div class="input-with-icon">
                            <span class="material-symbols-rounded">mail</span>
                            <input type="email" name="email" placeholder="Enter email address" required>
                        </div>

                        <div class="input-with-icon">
                            <span class="material-symbols-rounded">lock</span>
                            <input type="password" name="password" placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn-gradient">SIGN UP</button>
                    </form>

                    <div class="auth-divider">OR</div>
                    
                    <a href="/login" class="auth-link">LOGIN INSTEAD</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
