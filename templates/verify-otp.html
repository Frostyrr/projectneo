<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/images/singleNEO.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <link rel="stylesheet" href="/static/CSS/auth.css">

    <title>Verify OTP - Neo</title>
</head>
<body>

<div id="home" class="landing-hero">
    <nav class="landing-nav">
        <a href="/login" class="nav-brand">
            <img src="/static/images/NEO.png" alt="Neo Logo">
        </a>
        <div class="nav-links">
            <a href="/login#home">Home</a>
            <a href="/login#features">Features</a>
            <a href="/login#about">About</a>
            <a href="/login#contact">Contact</a>
        </div>
    </nav>

    <div class="hero-content-wrapper">

        <div class="hero-text-section">
            <h1>Neo.</h1>
            <h2>Verify Your Identity</h2>
            <p>Enter the one-time password sent to your email to continue resetting your account securely.</p>
        </div>

        <div class="hero-form-section">
            <div class="auth-card">
                <center><h2 class="auth-card-title">Verify OTP</h2></center>

                <p style="color: #a0a0a0; font-size: 14px; margin-bottom: 24px;">
                    Enter the OTP we sent to <strong>{{ email }}</strong>
                </p>

                <form class="auth-form" action="{% if purpose == 'register' %}/verify-register-otp/{{ email }}{% else %}/verify-otp/{{ email }}{% endif %}" method="POST">
                    {% if error %}
                            <div class="auth-error">{{ error }}
                                <span class="material-symbols-rounded">error</span>
                            </div>
                    {% endif %}
                    <div class="input-group">
                        <label for="otp">OTP Code</label>
                        <div class="input-with-icon">
                            <span class="material-symbols-rounded">lock</span>
                            <input type="text" id="otp" name="otp" placeholder="Enter OTP" required pattern="\d{6}" title="Enter 6-digit OTP">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Verify OTP</button>
                </form>


                <div style="margin-top: 10px;">
                    <a href="{{ back_url }}" class="auth-link">← Back</a>
                </div>

                <div class="auth-footer">
                    Didn't receive OTP? 
                    <a href="/resend-otp/{{ email }}/{{ purpose }}" class="auth-link">Resend</a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- JS -->
<script src="{{ url_for('static', filename='JS/auth.js') }}"></script>

</body>
</html>
