<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Assistant</title>
    <link rel="icon" type="image/x-icon" href="/static/images/singleNEO.png">
    <link rel="stylesheet" href="/static/CSS/chat_components/main.css">
    <link rel="stylesheet" href="/static/CSS/chat_components/sidebar.css">
    <link rel="stylesheet" href="/static/CSS/chat_components/chatbox.css">
    <link rel="stylesheet" href="/static/CSS/chat_components/inputarea.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="app-container">
        
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-top">
                <button id="menu-btn" class="icon-btn" title="Collapse menu">
                    <span class="material-symbols-rounded">menu</span>
                </button>
            </div>
            
            <div class="sidebar-new-chat">
                <button id="new-chat-btn" class="new-chat-btn">
                    <span class="material-symbols-rounded">add</span>
                    <span>New chat</span>
                </button>
            </div>

            <div class="sidebar-features" style="padding: 0 20px 10px 20px; border-bottom: 1px solid #333538; margin-bottom: 10px;">
                <ul class="sidebar-menu">
                    <li>
                        <a href="/tasks">
                            <span class="material-symbols-rounded">task</span>
                            Tasks
                        </a>
                    </li>
                    <li>
                        <a href="/schedule">
                            <span class="material-symbols-rounded">calendar_month</span>
                            Class Schedule
                        </a>
                    </li>
                    <li>
                        <a href="/reminder">
                            <span class="material-symbols-rounded">notifications</span>
                            Reminder
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-middle">
                <p class="recent-title">Recent Chats</p>
                <ul class="recent-list">
                    </ul>
            </div>

            <div class="sidebar-bottom" style="padding: 0;">
                <div class="user-profile-wrapper">
                    <div id="user-dropdown-menu" class="floating-dropdown hidden">
                        <a href="/settings" class="dropdown-item">
                            <span class="material-symbols-rounded">settings</span> Settings
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="/logout" class="dropdown-item danger-text">
                            <span class="material-symbols-rounded">logout</span> Log out
                        </a>
                    </div>
                    
                    <button id="user-profile-btn" class="user-profile-btn">
                        <div class="user-profile-info">
                            <div class="user-avatar-circle">
                                <span class="material-symbols-rounded">person</span>
                            </div>
                            <span class="user-name">{{ session.get('user', 'User') }}</span>
                        </div>
                    </button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="chat-header">
                <button id="open-menu-btn" class="icon-btn hidden">
                    <span class="material-symbols-rounded">menu</span>
                </button>
                <div class="header-title">
                    <h2>Neo</h2>
                    <span class="version-badge">1.0</span>
                </div>
                <img src="/static/images/singleNEO.png" alt="Neo" class="header-logo">
            </header>
            <div id="chat-box" class="chat-box">
                <div id="welcome-screen" class="welcome-screen">
                    <h1>Hello, {{ session.get('user', 'User') }}!</h1>
                    <p>How can I help you today?</p>
                </div>
            </div>

            <div class="input-wrapper">
                <div class="input-container">

                    <div id="image-preview-container" style="display: none; position: relative; margin-bottom: 8px;">
                            <img id="image-preview" src="" alt="Preview" style="max-height: 60px; border-radius: 8px; border: 1px solid #444;">
                            <button id="remove-image-btn" style="position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; cursor: pointer; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center;">✖</button>
                    </div>

                    <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp, image/gif" style="display: none;">
                        
                    <button id="image-btn" class="mic-icon-btn" title="Upload Image" onclick="document.getElementById('image-upload').click()">
                        <span class="material-symbols-rounded">attach_file</span>
                    </button>

                    <textarea id="user-input" placeholder="Ask Neo..." rows="1" autocomplete="off"></textarea>

                    <button id="mic-btn" class="mic-icon-btn" title="Use Voice">
                        <span class="material-symbols-rounded">mic</span>
                    </button>

                    <button id="send-btn" class="send-icon-btn">
                        <span class="material-symbols-rounded">send</span>
                    </button>
                </div>
                <p class="disclaimer">Neo may display inaccurate info, so double-check its responses.</p>
            </div>
        </main>
    </div>

    <div id="image-modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <span id="close-modal" style="position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer;">&times;</span>
        <img id="modal-img" src="" style="max-width: 90%; max-height: 90%; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

    <script src="/static/JS/api.js"></script>
    <script src="/static/JS/UserInterface.js"></script>
    <script src="/static/JS/app.js"></script>
    
    <script src="/static/JS/SpeechRecognition.js"></script>
    <script src="/static/JS/ImageUpload.js"></script>
    
</body>
</html>
